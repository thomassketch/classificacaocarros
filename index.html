<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Carros por Imagem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --success: #22c55e;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .main-content {
                grid-template-columns: 1fr 1fr;
            }
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #preview-container {
            width: 320px;
            height: 320px;
            background: #020617;
            border-radius: 12px;
            overflow: hidden;
            border: 2px dashed var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.6);
            transition: border-color 0.2s ease;
        }

        #preview-container.dragover {
            border-color: var(--accent);
            background: #0f172a;
        }

        #image-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            padding: 10px;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 20px;
            line-height: 1.4;
        }

        .btn-upload {
            margin-top: 20px;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .btn-upload:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        #file-input {
            display: none;
        }

        .results-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .results-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .label-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .class-row {
            background: #0f172a;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            opacity: 0.6; /* Fica meio apagado até ter uma previsão real */
        }

        .class-row.active {
            opacity: 1;
        }

        .class-row.highest {
            border-color: var(--success);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.2);
        }

        .class-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .class-name {
            font-weight: 600;
            text-transform: capitalize;
        }

        .class-percentage {
            font-weight: 700;
            color: var(--accent);
        }

        .class-row.highest .class-percentage {
            color: var(--success);
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s ease; /* Transição mais suave para imagem estática */
        }

        .class-row.highest .progress-bar-fill {
            background: var(--success);
        }

        #status-message {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Classificador de Veículos</h1>
            <p>Faça o upload de uma foto para identificar o formato do carro</p>
        </header>

        <div class="main-content">
            <!-- Coluna da Esquerda: Upload e Preview -->
            <div class="upload-section">
                <div id="preview-container">
                    <img id="image-preview" alt="Pré-visualização do carro">
                    <div class="placeholder-text" id="placeholder">
                        Arraste uma imagem aqui <br>ou clique no botão abaixo.
                    </div>
                </div>
                
                <input type="file" id="file-input" accept="image/*">
                <button class="btn-upload" type="button" onclick="document.getElementById('file-input').click()">Selecionar Imagem</button>
                
                <div id="status-message">Carregando inteligência artificial...</div>
            </div>

            <!-- Coluna da Direita: Resultados -->
            <div class="results-section">
                <div class="results-title">Resultado da Análise</div>
                <div class="label-container" id="label-container">
                    <!-- As barras de resultado serão geradas aqui automaticamente -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts do TensorFlow.js e Teachable Machine Image -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // Link estável do seu modelo do Teachable Machine
        const URL = "https://teachablemachine.withgoogle.com/models/7Wz03dDLJ/";

        let model, maxPredictions;
        const statusMessage = document.getElementById('status-message');
        const fileInput = document.getElementById('file-input');
        const imagePreview = document.getElementById('image-preview');
        const placeholder = document.getElementById('placeholder');
        const previewContainer = document.getElementById('preview-container');

        // Carrega o modelo de IA assim que a página abre
        async function loadModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                
                // Monta o esqueleto das barras de categorias na interface
                buildInterfaceRows();
                
                statusMessage.style.color = "var(--success)";
                statusMessage.innerText = "IA pronta! Aguardando imagem.";
            } catch (error) {
                console.error("Erro ao carregar o modelo Teachable Machine:", error);
                statusMessage.style.color = "#ef4444";
                statusMessage.innerText = "Erro ao carregar o modelo de IA.";
            }
        }

        // Cria as linhas de progresso dinamicamente com base nas classes cadastradas no modelo
        function buildInterfaceRows() {
            const container = document.getElementById("label-container");
            container.innerHTML = ""; 

            // Criará as linhas para as suas 5 classes (Hatch, SUV, Picape, sedan, esportivo)
            for (let i = 0; i < maxPredictions; i++) {
                const classRow = document.createElement("div");
                classRow.className = "class-row";
                classRow.id = `row-${i}`;

                classRow.innerHTML = `
                    <div class="class-info">
                        <span class="class-name" id="name-${i}">...</span>
                        <span class="class-percentage" id="percent-${i}">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="bar-${i}"></div>
                    </div>
                `;
                container.appendChild(classRow);
            }
        }

        // Gerencia a leitura do arquivo enviado pelo usuário
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            processFile(file);
        });

        function processFile(file) {
            if (!model) {
                alert("O modelo ainda está carregando. Aguarde um instante.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                // Atualiza a imagem de preview com o arquivo carregado
                imagePreview.src = event.target.result;
                imagePreview.style.display = 'block';
                placeholder.style.display = 'none';

                // Dispara a previsão assim que o elemento da imagem terminar de carregar os pixels
                imagePreview.onload = async function() {
                    statusMessage.style.color = "var(--accent)";
                    statusMessage.innerText = "Analisando formato do carro...";
                    await predict(imagePreview);
                    statusMessage.innerText = "Análise concluída!";
                };
            };
            reader.readAsDataURL(file);
        }

        // Executa a classificação da imagem estática
        async function predict(imageElement) {
            const prediction = await model.predict(imageElement);
            
            // Encontra qual classe teve a maior pontuação
            let highestIndex = 0;
            let highestVal = 0;

            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestVal) {
                    highestVal = prediction[i].probability;
                    highestIndex = i;
                }
            }

            // Atualiza a interface gráfica com as novas porcentagens
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probabilityPercentage = (prediction[i].probability * 100).toFixed(0);

                document.getElementById(`name-${i}`).innerText = className;
                document.getElementById(`percent-${i}`).innerText = `${probabilityPercentage}%`;
                document.getElementById(`bar-${i}`).style.width = `${probabilityPercentage}%`;

                const currentRow = document.getElementById(`row-${i}`);
                currentRow.classList.add("active"); // Ativa a opacidade da linha analisada

                // Destaca em verde o formato vencedor (caso tenha relevância acima de 10%)
                if (i === highestIndex && prediction[i].probability > 0.1) {
                    currentRow.classList.add("highest");
                } else {
                    currentRow.classList.remove("highest");
                }
            }
        }

        // Bônus: Suporte para arrastar e soltar a imagem direto no quadrado
        previewContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            previewContainer.classList.add('dragover');
        });

        previewContainer.addEventListener('dragleave', () => {
            previewContainer.classList.remove('dragover');
        });

        previewContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            previewContainer.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                processFile(files[0]);
            }
        });

        // Inicializa o carregamento do modelo ao abrir o arquivo
        window.onload = loadModel;
    </script>
</body>
</html>
